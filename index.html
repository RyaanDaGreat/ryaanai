<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RPG World</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  padding: 10px;
  text-align: center;
  background: #111827;
}

#stats {
  padding: 10px;
  background: #1f2937;
  display: flex;
  justify-content: space-around;
}

#chat {
  height: 60vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 6px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #2563eb; margin-left: auto; }
.ai { background: #374151; }

#inputBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
}

button {
  padding: 15px;
  background: #22c55e;
  border: none;
}
</style>
</head>

<body>

<header>⚔️ AI RPG WORLD</header>

<div id="stats">
  <div>⭐ Level: <span id="level">1</span></div>
  <div>🔥 XP: <span id="xp">0</span></div>
  <div>❤️ HP: <span id="hp">100</span></div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your action..." />
  <button onclick="send()">Send</button>
</div>

<script>
let level = 1;
let xp = 0;
let hp = 100;

function updateStats() {
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;
  document.getElementById("hp").innerText = hp;
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

// 🎮 LEVEL SYSTEM
function gainXP(amount) {
  xp += amount;

  if (xp >= level * 100) {
    xp = 0;
    level++;
    hp += 20;
    add("🎉 You leveled up! You are now Level " + level, "ai");
  }

  updateStats();
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  add("You: " + text, "user");
  input.value = "";

  const res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message:
        "You are a dungeon master in an RPG game. Respond with story + consequences + reward XP." +
        " Player action: " + text
    })
  });

  const data = await res.json();

  add(data.reply, "ai");

  // 🎯 SIMPLE RPG RULE ENGINE
  if (text.includes("fight") || text.includes("attack")) {
    gainXP(40);
    hp -= 10;
  } else if (text.includes("help") || text.includes("save")) {
    gainXP(25);
  } else {
    gainXP(10);
  }

  updateStats();
}

updateStats();
</script>

</body>
</html>
