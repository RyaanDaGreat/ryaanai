<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML RPG Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  padding: 10px;
  text-align: center;
  background: #111827;
}

#stats {
  display: flex;
  justify-content: space-around;
  background: #1f2937;
  padding: 10px;
}

#chat {
  height: 65vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 6px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #2563eb; margin-left: auto; }
.ai { background: #374151; }

#inputBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
}

button {
  padding: 15px;
  background: #22c55e;
  border: none;
}
</style>
</head>

<body>

<header>⚔️ PURE HTML RPG WORLD</header>

<div id="stats">
  <div>⭐ Level: <span id="level">1</span></div>
  <div>🔥 XP: <span id="xp">0</span></div>
  <div>❤️ HP: <span id="hp">100</span></div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your action..." />
  <button onclick="send()">Go</button>
</div>

<script>
let level = 1;
let xp = 0;
let hp = 100;

function updateStats() {
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;
  document.getElementById("hp").innerText = hp;
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

// 🎲 SIMPLE RPG STORY ENGINE
function aiResponse(action) {
  const responses = [
    "You enter a dark cave and hear whispers in the distance...",
    "A dragon appears from the shadows, staring at you silently.",
    "You find an ancient sword glowing with blue energy.",
    "A mysterious wizard offers you a choice: power or wisdom.",
    "The ground shakes... something massive is approaching."
  ];

  return responses[Math.floor(Math.random() * responses.length)];
}

// 🎮 LEVEL SYSTEM
function gainXP(amount) {
  xp += amount;

  if (xp >= level * 100) {
    xp = 0;
    level++;
    hp += 20;
    add("🎉 LEVEL UP! You are now Level " + level, "ai");
  }

  updateStats();
}

function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  add("You: " + text, "user");
  input.value = "";

  // AI story reply (offline simulation)
  const reply = aiResponse(text);
  add(reply, "ai");

  // ⚔️ GAME LOGIC
  if (text.includes("attack") || text.includes("fight")) {
    gainXP(40);
    hp -= 10;
  } 
  else if (text.includes("explore") || text.includes("search")) {
    gainXP(25);
  } 
  else {
    gainXP(10);
  }

  updateStats();

  if (hp <= 0) {
    add("💀 You died... refresh to restart.", "ai");
  }
}

updateStats();
</script>

</body>
</html>
